services:
  # Production: builds & serves static files via nginx
  app:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    restart: unless-stopped

  # Development: Vite dev server with hot-reload + test access
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  node_modules:
